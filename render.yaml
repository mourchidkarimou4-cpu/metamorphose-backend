services:
  - type: web
    name: metamorphose-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: metamorphose-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://metamorphose.netlify.app"

databases:
  - name: metamorphose-db
    databaseName: metamorphose
    user: metamorphose
